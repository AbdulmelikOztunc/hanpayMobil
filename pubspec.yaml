name: hanpay_mobil
description: HANPAY mobile application for agents, distributors and admins.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  flutter_secure_storage: ^9.2.4
  intl: ^0.20.2
  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  file_picker: ^10.2.0
  path: ^1.9.1
  shared_preferences: ^2.3.4
  signalr_netcore: ^1.4.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/locales/

